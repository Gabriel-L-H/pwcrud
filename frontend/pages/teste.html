<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Posts</title>

    <link rel="stylesheet" href="../css/teste.css">
</head>
<body>

<div class="container">

    <h1>CRUD de Posts</h1>

    <form id="postForm">

        <input type="hidden" id="id">

        <div class="grupo">
            <label>Nome do Usuário</label>
            <input type="text" id="nomeUsuario" required>
        </div>

        <div class="grupo">
            <label>Nome da OSC</label>
            <input type="text" id="nomeOsc" required>
        </div>

        <div class="grupo checkbox">
            <input type="checkbox" id="ativo">
            <label>Ativo</label>
        </div>

        <div class="grupo">
            <label>Título</label>
            <input type="text" id="titulo" required>
        </div>

        <div class="grupo">
            <label>Conteúdo</label>
            <textarea id="conteudo" rows="5"></textarea>
        </div>

        <div class="grupo">
            <label>Imagem</label>
            <input type="file" id="imagem" accept="image/*">
        </div>

        <img id="preview" class="preview">

        <button type="submit">
            Salvar
        </button>

    </form>

    <hr>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Imagem</th>
                <th>Título</th>
                <th>Usuário</th>
                <th>OSC</th>
                <th>Ativo</th>
                <th>Criado</th>
                <th>Atualizado</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="tabelaPosts"></tbody>

    </table>

</div>

<script src="../js/teste.js"></script>

</body>
</html>
